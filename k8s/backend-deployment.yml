apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: chat-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      name: backend-pod
      namespace: chat-app
      labels:
        app: backend
    spec:
      containers:
        - name: chatapp-backend
          image: sanskar360/chatapp-backend:latest
          ports:
            - containerPort: 5001
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "5001"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: chat-app-secrets
                  key: jwt
            - name: CLOUDINARY_CLOUD_NAME
              valueFrom:
                secretKeyRef:
                  name: chat-app-secrets
                  key: cloudname
            - name: CLOUDINARY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: chat-app-secrets
                  key: cloudapikey
            - name: CLOUDINARY_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: chat-app-secrets
                  key: cloudapisecret
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: chat-app-secrets
                  key: mongourl
